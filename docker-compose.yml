services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dbkit
      POSTGRES_PASSWORD: dbkit
      POSTGRES_DB: dbkit
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbkit"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data  # ephemeral; test data need not survive restarts
