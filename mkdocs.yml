site_name: dbkit
site_description: A thin, high-throughput SQL toolkit over SQLAlchemy Core — sync and async.
site_url: https://dbkit.github.io/dbkit/
repo_url: https://github.com/dbkit/dbkit
repo_name: dbkit/dbkit
edit_uri: edit/main/docs/

docs_dir: docs

nav:
  - Home: index.md
  - CLI: cli.md
  - API Reference:
      - Database (async/sync): api/database.md
      - Configuration: api/config.md
      - Query & routing: api/query.md
      - Errors: api/errors.md
      - Observability: api/observability.md
      - Integrations: api/integrations.md
  - Security: security.md
  - Dashboards & Alerting: observability.md
  - Troubleshooting: troubleshooting.md
  - Testing & Benchmarks: testing.md
  - Roadmap: roadmap.md
  - Requirements: requirements.md
  - Versioning & Deprecation: versioning.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            members_order: source
            filters: ["!^_"]

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
