site_name: dbkit
site_description: A thin, high-throughput SQL toolkit over SQLAlchemy Core — sync and async.
repo_url: https://github.com/dbkit/dbkit
repo_name: dbkit/dbkit

docs_dir: docs

nav:
  - Home: index.md
  - CLI: cli.md
  - Testing & Benchmarks: testing.md
  - Roadmap: roadmap.md
  - Requirements: requirements.md

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true
