site_name: dbkit
site_description: A thin, high-throughput SQL toolkit over SQLAlchemy Core — sync and async.
repo_url: https://github.com/dbkit/dbkit
repo_name: dbkit/dbkit

docs_dir: docs

nav:
  - Home: index.md
  - CLI: cli.md
  - API Reference:
      - Database (async/sync): api/database.md
      - Configuration: api/config.md
      - Query & routing: api/query.md
      - Errors: api/errors.md
      - Observability: api/observability.md
      - Integrations: api/integrations.md
  - Testing & Benchmarks: testing.md
  - Roadmap: roadmap.md
  - Requirements: requirements.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            members_order: source
            filters: ["!^_"]

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true
