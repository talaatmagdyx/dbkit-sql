name: Bug report
description: Report a bug in dbkit
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do **not** use this
        template for security vulnerabilities — see
        [SECURITY.md](https://github.com/talaatmagdyx/dbkit-sql/blob/main/SECURITY.md)
        instead.

  - type: input
    id: version
    attributes:
      label: dbkit-sql version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: frontend
    attributes:
      label: Frontend
      options:
        - async (AsyncDatabase)
        - sync (Database)
        - both / not frontend-specific
    validations:
      required: true

  - type: dropdown
    id: driver
    attributes:
      label: Driver
      options:
        - psycopg (default)
        - asyncpg
        - other / not driver-specific
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including any stack trace.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        A minimal script (ideally runnable against a disposable PostgreSQL, e.g.
        via testcontainers) that reproduces the issue. This is the single most
        useful thing you can provide.
      render: python
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, PostgreSQL version, SQLAlchemy version.
      placeholder: |
        - Python: 3.12.2
        - OS: Ubuntu 22.04
        - PostgreSQL: 16
        - SQLAlchemy: 2.0.32
    validations:
      required: false
