name: Deploy Docs

# Builds the mkdocs site and publishes it to GitHub Pages via the "GitHub Actions" Pages source
# (no gh-pages branch needed). One-time manual setup required before this can deploy: in the
# repo's Settings > Pages, set "Build and deployment > Source" to "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - src/dbkit/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.12
      - run: uv sync --extra dev
      - run: uv run mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
