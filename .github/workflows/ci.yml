name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --extra dev
      - name: unasync drift check
        run: uv run python tools/run_unasync.py --check
      - run: uv run ruff check src tests benchmarks examples
      - run: uv run ruff format --check src tests examples
      - run: uv run mypy
      - name: docs site builds
        run: uv run mkdocs build --strict
      - name: package builds and passes metadata checks
        run: |
          uv run python -m build
          uv run twine check dist/*

  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --extra dev
      - run: uv run pytest -q -m "not integration" --cov=dbkit --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dbkit
          POSTGRES_PASSWORD: dbkit
          POSTGRES_DB: dbkit
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dbkit"
          --health-interval 2s --health-timeout 3s --health-retries 15
    env:
      DBKIT_TEST_DSN: postgresql+psycopg://dbkit:dbkit@localhost:5432/dbkit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --extra dev
      - name: integration + chaos/resilience suite
        run: uv run pytest -q -m integration
      - name: short soak with fault injection (leak/recovery gate)
        run: uv run python -m benchmarks.soak --dsn "$DBKIT_TEST_DSN" --duration 60 --kill-every 20
      - name: performance regression gate (overhead ceiling + pool-exhaustion contract)
        run: uv run python -m benchmarks.check_regression --dsn "$DBKIT_TEST_DSN"
      - name: benchmark smoke (best-effort, non-gating)
        run: uv run python -m benchmarks --dsn "$DBKIT_TEST_DSN" --no-save || echo "benchmarks best-effort"

  integration-asyncpg:
    # asyncpg is async-only (no sync engine support) and doesn't implement the psycopg-only raw
    # driver escape hatches (COPY, pipeline mode, PgBouncer autoprep control) — those tests
    # self-skip via the `requires_psycopg` fixture. This job covers everything else: CRUD,
    # transactions/savepoints, cardinality, resilience/chaos, sharding/replicas, and the CLI.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dbkit
          POSTGRES_PASSWORD: dbkit
          POSTGRES_DB: dbkit
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dbkit"
          --health-interval 2s --health-timeout 3s --health-retries 15
    env:
      DBKIT_TEST_DSN: postgresql+asyncpg://dbkit:dbkit@localhost:5432/dbkit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --extra dev
      - name: async-only integration + chaos/resilience suite
        run: uv run pytest -q -m integration --ignore=tests/integration/test_sync_integration.py

  all-checks:
    # A single required status for branch protection, instead of listing every job above
    # individually (which breaks whenever a job is renamed/added/removed).
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [static, unit, integration, integration-asyncpg]
    if: always()
    steps:
      - name: Fail if any required job did not succeed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || \
                "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed."
