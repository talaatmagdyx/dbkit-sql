name: Release

# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push --tags`.
# Uses PyPI's trusted publishing (OIDC) — no API token stored in this repo. Configure the
# trusted publisher for this repo/workflow at
# https://pypi.org/manage/project/dbkit-sql/settings/publishing/ before the first release
# (the project must already exist on PyPI, or use the "pending publisher" flow for a
# not-yet-published project at https://pypi.org/manage/account/publishing/).
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --extra dev
      - name: full gate before release
        run: |
          uv run python tools/run_unasync.py --check
          uv run ruff check src tests benchmarks
          uv run ruff format --check src tests
          uv run mypy
          uv run pytest -q -m "not integration"
      - name: build sdist and wheel
        run: uv run python -m build
      - name: verify package metadata
        run: uv run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
